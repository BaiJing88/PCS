<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCS 中央控制器 - 正在跳转...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            text-align: center;
            color: #fff;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(99, 102, 241, 0.6); }
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        p {
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #334155;
            border-top-color: #6366f1;
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .link-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #6366f1;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .link-btn:hover {
            background: #4f46e5;
        }
    </style>
    <script>
        // 立即跳转到管理后台
        window.location.href = 'admin.html';
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="40" height="40" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        </div>
        <h1>PCS 中央控制器</h1>
        <p>Player Credit System</p>
        <div class="spinner"></div>
        <p style="margin-top: 16px;">正在跳转到管理后台...</p>
        <a href="admin.html" class="link-btn">点击进入管理后台</a>
    </div>
</body>
</html>
