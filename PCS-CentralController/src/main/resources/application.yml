# ============================================
# PCS Central Controller Configuration
# ============================================
# 
# IMPORTANT: This file will be auto-extracted to ./config/application.yml on first run.
# After that, you can edit the external config file to customize settings.
#
# This configuration does NOT use environment variables.
# All values are hardcoded for simplicity and reliability.
#
# ============================================

server:
  port: 8080
  servlet:
    context-path: /
  ssl:
    enabled: false
    key-store: classpath:keystore.p12
    key-store-password: changeme
    key-store-type: PKCS12

spring:
  application:
    name: pcs-central-controller
  
  datasource:
    # H2 文件数据库（数据存储在 C:/PCS/data/pcsdb.mv.db）
    # 使用绝对路径确保数据不会丢失
    # 使用文件模式存储，移除在部分环境中不被支持的参数（AUTO_SERVER / DB_CLOSE_ON_EXIT）
    # 如果需要多人/多进程访问，请改为使用 MySQL 或配置 H2 的服务器模式。
    url: "jdbc:h2:file:C:/PCS/data/pcsdb;DB_CLOSE_DELAY=-1"
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
    # 【推荐】生产环境使用 MySQL 数据库（更稳定，支持远程备份）
    # url: jdbc:mysql://localhost:3306/pcs?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    # username: pcs
    # password: your_password
    # driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  
  h2:
    console:
      enabled: true
      path: /h2-console

# PCS 配置
pcs:
  security:
    # 密钥存储配置
    keystore-path: ./keys
    # 令牌有效期（小时）
    token-expiry: 24
    # 最大失败登录次数
    max-login-attempts: 5
    # 登录锁定时间（分钟）
    lockout-duration: 30
  
  websocket:
    # 心跳间隔（秒）
    heartbeat-interval: 30
    # 连接超时（秒）
    connection-timeout: 60
  
  vote:
    # 默认最少总票数
    default-min-votes: 3
    # 默认通过率
    default-pass-rate: 0.6666
    # 默认投票持续时间（秒）
    default-duration: 300
    # 自动检查间隔（秒）
    check-interval: 10
  
  server:
    # 服务器连接API密钥（用于Spigot/Forge等服务器插件连接中控）
    # 生产环境请修改此值！
    api-key: a354rgas35er4gaerg354adfhjr

# 日志配置
logging:
  level:
    com.pcs.central: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/pcs.log
    max-size: 100MB
    max-history: 30
